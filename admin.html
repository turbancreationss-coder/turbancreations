<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:30px;
    }

    h1{
      text-align:center;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th,td{
      border:1px solid #ddd;
      padding:12px;
      text-align:left;
    }

    th{
      background:black;
      color:white;
    }

    button{
      padding:8px 12px;
      border:none;
      background:red;
      color:white;
      cursor:pointer;
    }

  </style>

</head>

<body>

<h1>Student Records</h1>

<table>

  <thead>

    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Course</th>
      <th>Fees</th>
      <th>Delete</th>
    </tr>

  </thead>

  <tbody id="studentTableBody">

  </tbody>

</table>

<script type="module">

import { db }
from "./firebase.js";

import {
  collection,
  getDocs,
  deleteDoc,
  doc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const tableBody =
document.getElementById(
"studentTableBody"
);

async function loadStudents(){

  const querySnapshot =
  await getDocs(
    collection(db,"students")
  );

  querySnapshot.forEach((studentDoc)=>{

    const student =
    studentDoc.data();

    const row = `

      <tr>

        <td>${student.name}</td>

        <td>${student.phone}</td>

        <td>${student.course}</td>

        <td>${student.fees}</td>

        <td>

          <button
          onclick="deleteStudent('${studentDoc.id}')">

            Delete

          </button>

        </td>

      </tr>

    `;

    tableBody.innerHTML += row;

  });

}

window.deleteStudent =
async function(id){

  await deleteDoc(
    doc(db,"students",id)
  );

  location.reload();

}

loadStudents();

</script>

</body>
</html>
