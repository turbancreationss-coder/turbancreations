<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:30px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#222;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    #searchInput{

      flex:1;
      min-width:250px;

      padding:14px;

      border:none;

      border-radius:10px;

      font-size:16px;

      box-shadow:0 3px 10px rgba(0,0,0,0.1);

    }

    .stats{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:30px;

    }

    .card{

      background:white;

      padding:25px;

      border-radius:15px;

      box-shadow:0 3px 12px rgba(0,0,0,0.1);

    }

    .card h2{
      font-size:18px;
      margin-bottom:10px;
      color:#555;
    }

    .card p{
      font-size:32px;
      font-weight:bold;
      color:#111;
    }

    table{

      width:100%;

      border-collapse:collapse;

      background:white;

      border-radius:15px;

      overflow:hidden;

      box-shadow:0 3px 12px rgba(0,0,0,0.1);

    }

    th{

      background:black;

      color:white;

      padding:15px;

      text-align:left;

    }

    td{

      padding:15px;

      border-bottom:1px solid #ddd;

    }

    tr:hover{
      background:#f9f9f9;
    }

    .btn{

      padding:10px 14px;

      border:none;

      border-radius:8px;

      cursor:pointer;

      color:white;

      font-weight:bold;

      margin-right:8px;

    }

    .delete-btn{
      background:red;
    }

    .edit-btn{
      background:#0d6efd;
    }

    .status{

      padding:6px 14px;

      border-radius:30px;

      font-size:13px;

      font-weight:bold;

      color:white;

    }

    .paid{
      background:green;
    }

    .pending{
      background:orange;
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      table{
        font-size:14px;
      }

      th,td{
        padding:10px;
      }

    }

  </style>

</head>

<body>

  <h1>TurbanCreations Admin Panel</h1>

  <div class="top-bar">

    <input
    type="text"
    id="searchInput"
    placeholder="Search student by name or phone">

  </div>


  <div class="stats">

    <div class="card">
      <h2>Total Students</h2>
      <p id="totalStudents">0</p>
    </div>

    <div class="card">
      <h2>Total Revenue</h2>
      <p id="totalRevenue">₹0</p>
    </div>

    <div class="card">
      <h2>Paid Students</h2>
      <p id="paidStudents">0</p>
    </div>

    <div class="card">
      <h2>Pending Fees</h2>
      <p id="pendingStudents">0</p>
    </div>

  </div>


  <table>

    <thead>

      <tr>

        <th>Name</th>

        <th>Phone</th>

        <th>Course</th>

        <th>Fees</th>

        <th>Status</th>

        <th>Delete</th>

      </tr>

    </thead>

    <tbody id="studentTableBody">

    </tbody>

  </table>


<script type="module">

import { db }
from "./firebase.js";

import {

  collection,
  getDocs,
  deleteDoc,
  doc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const tableBody =
document.getElementById(
"studentTableBody"
);

const totalStudents =
document.getElementById(
"totalStudents"
);

const totalRevenue =
document.getElementById(
"totalRevenue"
);

const paidStudents =
document.getElementById(
"paidStudents"
);

const pendingStudents =
document.getElementById(
"pendingStudents"
);


let allStudents = [];


async function loadStudents(){

  tableBody.innerHTML = "";

  const querySnapshot =

  await getDocs(
    collection(db,"students")
  );

  let total = 0;

  let revenue = 0;

  let paid = 0;

  let pending = 0;

  allStudents = [];

  querySnapshot.forEach((studentDoc)=>{

    const student =
    studentDoc.data();

    student.id =
    studentDoc.id;

    allStudents.push(student);

  });

  renderStudents(allStudents);

  allStudents.forEach((student)=>{

    total++;

    revenue +=
    Number(student.fees || 0);

    if(student.status === "Pending"){

      pending++;

    }else{

      paid++;

    }

  });

  totalStudents.innerText =
  total;

  totalRevenue.innerText =
  `₹${revenue}`;

  paidStudents.innerText =
  paid;

  pendingStudents.innerText =
  pending;

}



function renderStudents(students){

  tableBody.innerHTML = "";

  students.forEach((student)=>{

    const status =
    student.status || "Paid";

    const row = `

      <tr>

        <td>${student.name}</td>

        <td>${student.phone}</td>

        <td>${student.course}</td>

        <td>₹${student.fees}</td>

        <td>

          <span class="status
          ${status === "Paid"
          ? "paid"
          : "pending"}">

            ${status}

          </span>

        </td>

        <td>

          <button
          class="btn delete-btn"
          onclick="deleteStudent('${student.id}')">

            Delete

          </button>

        </td>

      </tr>

    `;

    tableBody.innerHTML += row;

  });

}



window.deleteStudent =
async function(id){

  const confirmDelete =
  confirm(
    "Delete this student?"
  );

  if(!confirmDelete) return;

  await deleteDoc(
    doc(db,"students",id)
  );

  loadStudents();

}



document
.getElementById("searchInput")

.addEventListener("input",function(){

  const value =

  this.value.toLowerCase();

  const filtered =

  allStudents.filter((student)=>{

    return (

      student.name
      .toLowerCase()
      .includes(value)

      ||

      student.phone
      .toLowerCase()
      .includes(value)

    );

  });

  renderStudents(filtered);

});


loadStudents();

</script>

</body>
</html>
