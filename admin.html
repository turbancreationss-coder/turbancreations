<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TurbanCreations Admin Panel</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background:#f4f4f4;

  padding:25px;

}

h1{

  text-align:center;

  margin-bottom:25px;

  color:#111;

}

.top-bar{

  margin-bottom:25px;

}

#searchInput{

  width:100%;

  padding:15px;

  border:none;

  border-radius:10px;

  font-size:16px;

  box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.stats{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-bottom:30px;

}

.card{

  background:white;

  padding:25px;

  border-radius:15px;

  box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.card h2{

  font-size:18px;

  margin-bottom:10px;

  color:#666;

}

.card p{

  font-size:34px;

  font-weight:bold;

  color:#111;

}

.table-wrapper{

  overflow-x:auto;

}

table{

  width:100%;

  border-collapse:collapse;

  background:white;

  border-radius:15px;

  overflow:hidden;

  box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

th{

  background:#111;

  color:white;

  padding:15px;

  text-align:left;

  font-size:14px;

}

td{

  padding:14px;

  border-bottom:1px solid #ddd;

  font-size:14px;

}

tr:hover{

  background:#fafafa;

}

.btn{

  border:none;

  padding:9px 14px;

  border-radius:8px;

  color:white;

  cursor:pointer;

  font-weight:bold;

  margin-right:6px;

}

.edit-btn{

  background:#0d6efd;

}

.delete-btn{

  background:#dc3545;

}

.receipt-btn{

  background:#198754;

}

.status{

  padding:7px 12px;

  border-radius:30px;

  color:white;

  font-size:12px;

  font-weight:bold;

}

.paid{

  background:green;

}

.pending{

  background:orange;

}

.payment-badge{

  padding:6px 10px;

  border-radius:30px;

  font-size:12px;

  font-weight:bold;

  background:#eee;

}

@media(max-width:768px){

  body{

    padding:15px;

  }

}

</style>

</head>

<body>

<h1>
TurbanCreations Admin Panel
</h1>


<div class="top-bar">

<input
type="text"
id="searchInput"
placeholder="Search student by name or phone">

</div>


<div class="stats">

<div class="card">

<h2>
Total Students
</h2>

<p id="totalStudents">
0
</p>

</div>

</div>


<div class="table-wrapper">

<table>

<thead>

<tr>

<th>
Student
</th>

<th>
Father
</th>

<th>
Phone
</th>

<th>
Course
</th>

<th>
Fees
</th>

<th>
Payment
</th>

<th>
Status
</th>

<th>
Actions
</th>

</tr>

</thead>

<tbody id="studentTableBody">

</tbody>

</table>

</div>


<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
deleteDoc,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const tableBody =
document.getElementById(
"studentTableBody"
);

const totalStudents =
document.getElementById(
"totalStudents"
);

let allStudents = [];


/* LOAD STUDENTS */

async function loadStudents(){

tableBody.innerHTML = "";

const querySnapshot =

await getDocs(
collection(db,"students")
);

allStudents = [];

querySnapshot.forEach((studentDoc)=>{

const student =
studentDoc.data();

student.id =
studentDoc.id;

allStudents.push(student);

});

renderStudents(allStudents);

totalStudents.innerText =
allStudents.length;

}


/* RENDER TABLE */

function renderStudents(students){

tableBody.innerHTML = "";

students.forEach((student)=>{

const status =
student.status || "Pending";

const paymentMode =
student.paymentMode || "-";

const row = `

<tr>

<td>
${student.name || ""}
</td>

<td>
${student.fatherName || ""}
</td>

<td>
${student.phone || ""}
</td>

<td>
${student.course || ""}
</td>

<td>
₹ ${student.fees || "0"}
</td>

<td>

<span class="payment-badge">

${paymentMode}

</span>

</td>

<td>

<span class="status
${status === "Paid"
? "paid"
: "pending"}">

${status}

</span>

</td>

<td>

<button
class="btn edit-btn"
onclick="editStudent('${student.id}')">

Edit

</button>

<button
class="btn delete-btn"
onclick="deleteStudent('${student.id}')">

Delete

</button>

<button
class="btn receipt-btn"
onclick="generateReceipt('${student.id}')">

Receipt

</button>

</td>

</tr>

`;

tableBody.innerHTML += row;

});

}


/* DELETE */

window.deleteStudent =
async function(id){

const confirmDelete =
confirm(
"Delete this student?"
);

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"students",id)
);

alert(
"Student Deleted Successfully"
);

loadStudents();

}

catch(error){

console.error(error);

alert(
"Error deleting student"
);

}

}


/* EDIT */

window.editStudent =
async function(id){

const student =
allStudents.find(
s => s.id === id
);

const newName =
prompt(
"Student Name",
student.name || ""
);

if(newName === null) return;

const newFatherName =
prompt(
"Father Name",
student.fatherName || ""
);

if(newFatherName === null) return;

const newPhone =
prompt(
"Phone Number",
student.phone || ""
);

if(newPhone === null) return;

const newFees =
prompt(
"Course Fees",
student.fees || ""
);

if(newFees === null) return;


/* PAYMENT MODE */

const paymentMode =
prompt(
"Payment Mode: Cash or UPI",
student.paymentMode || ""
);

if(paymentMode === null) return;


/* STATUS */

const newStatus =
prompt(
"Status: Paid or Pending",
student.status || "Pending"
);

if(newStatus === null) return;


try{

await updateDoc(

doc(db,"students",id),

{

name:newName,

fatherName:newFatherName,

phone:newPhone,

fees:newFees,

paymentMode:paymentMode,

status:newStatus,

course:student.course,

batch:student.batch,

email:student.email,

address:student.address,

notes:student.notes

}

);

alert(
"Student Updated Successfully"
);

loadStudents();

}

catch(error){

console.error(error);

alert(
"Error Updating Student"
);

}

}


/* SEARCH */

document
.getElementById("searchInput")

.addEventListener("input",function(){

const value =

this.value.toLowerCase();

const filtered =

allStudents.filter((student)=>{

return (

(student.name || "")
.toLowerCase()
.includes(value)

||

(student.phone || "")
.toLowerCase()
.includes(value)

);

});

renderStudents(filtered);

});


/* RECEIPT */

window.generateReceipt =
function(id){

const student =
allStudents.find(
s => s.id === id
);

localStorage.setItem(
"receiptStudent",
JSON.stringify(student)
);

window.open(
"receipt.html",
"_blank"
);

}


/* START */

loadStudents();

</script>

</body>
</html>
