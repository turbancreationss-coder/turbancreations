<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>TurbanCreations Admin Panel</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:#f5f5f5;

      padding:30px;

    }

    h1{

      text-align:center;

      margin-bottom:20px;

      color:#111;

    }

    .logout-box{

      text-align:right;

      margin-bottom:20px;

    }

    #logoutBtn{

      padding:12px 20px;

      border:none;

      border-radius:10px;

      background:#dc3545;

      color:white;

      font-weight:bold;

      cursor:pointer;

    }

    .top-bar{

      margin-bottom:25px;

    }

    #searchInput{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      font-size:16px;

      box-shadow:0 3px 10px rgba(0,0,0,0.1);

    }

    .stats{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:30px;

    }

    .card{

      background:white;

      padding:25px;

      border-radius:15px;

      box-shadow:0 3px 10px rgba(0,0,0,0.1);

    }

    .card h2{

      font-size:18px;

      margin-bottom:10px;

      color:#666;

    }

    .card p{

      font-size:34px;

      font-weight:bold;

      color:#111;

    }

    table{

      width:100%;

      border-collapse:collapse;

      background:white;

      border-radius:15px;

      overflow:hidden;

      box-shadow:0 3px 10px rgba(0,0,0,0.1);

    }

    th{

      background:#111;

      color:white;

      padding:15px;

      text-align:left;

    }

    td{

      padding:15px;

      border-bottom:1px solid #ddd;

    }

    tr:hover{

      background:#f9f9f9;

    }

    .btn{

      border:none;

      padding:10px 14px;

      border-radius:8px;

      color:white;

      cursor:pointer;

      font-weight:bold;

      margin-right:8px;

    }

    .edit-btn{

      background:#0d6efd;

    }

    .delete-btn{

      background:#dc3545;

    }
    
     .receipt-btn{

  background:#ff7a00;

     }
    .status{

      padding:7px 14px;

      border-radius:30px;

      color:white;

      font-size:13px;

      font-weight:bold;

    }

    .paid{

      background:green;

    }

    .pending{

      background:orange;

    }

    @media(max-width:768px){

      body{

        padding:15px;

      }

      table{

        font-size:14px;

      }

      th,td{

        padding:10px;

      }

    }

  </style>

</head>

<body>

<h1>TurbanCreations Admin Panel</h1>


<div class="logout-box">

  <button id="logoutBtn">

    Logout

  </button>

</div>


<div class="top-bar">

  <input
  type="text"
  id="searchInput"
  placeholder="Search student by name or phone">

</div>


<div class="stats">

  <div class="card">

    <h2>Total Students</h2>

    <p id="totalStudents">0</p>

  </div>

</div>


<table>

  <thead>

    <tr>

      <th>Student Name</th>

      <th>Father Name</th>

      <th>Phone</th>

      <th>Course</th>

      <th>Batch</th>

      <th>Status</th>

      <th>Actions</th>

    </tr>

  </thead>

  <tbody id="studentTableBody">

  </tbody>

</table>



<script type="module">

import { db, auth }

from "./firebase.js";


import {

  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {

  onAuthStateChanged,
  signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



onAuthStateChanged(auth,(user)=>{

  if(!user){

    window.location.href =
    "login.html";

  }

});



const tableBody =
document.getElementById(
"studentTableBody"
);

const totalStudents =
document.getElementById(
"totalStudents"
);

let allStudents = [];


async function loadStudents(){

  tableBody.innerHTML = "";

  const querySnapshot =

  await getDocs(
    collection(db,"students")
  );

  allStudents = [];

  querySnapshot.forEach((studentDoc)=>{

    const student =
    studentDoc.data();

    student.id =
    studentDoc.id;

    allStudents.push(student);

  });

  renderStudents(allStudents);

  totalStudents.innerText =
  allStudents.length;

}



function renderStudents(students){

  tableBody.innerHTML = "";

  students.forEach((student)=>{

    const status =
    student.status || "Pending";

    const row = `

      <tr>

        <td>${student.name || ""}</td>

        <td>${student.fatherName || ""}</td>

        <td>${student.phone || ""}</td>

        <td>${student.course || ""}</td>

        <td>${student.batch || ""}</td>

        <td>

          <span class="status
          ${status === "Paid"
          ? "paid"
          : "pending"}">

            ${status}

          </span>

        </td>

        <td>

          <button
          class="btn edit-btn"
          onclick="editStudent('${student.id}')">

            Edit

          </button>

          <button
          class="btn delete-btn"
          onclick="deleteStudent('${student.id}')">

            Delete

          </button>

          <button
           class="btn receipt-btn"
           onclick="generateReceipt('${student.id}')">
           Receipt
         </button>

        </td>

      </tr>

    `;

    tableBody.innerHTML += row;

  });

}



window.deleteStudent =
async function(id){

  const confirmDelete =
  confirm(
    "Delete this student?"
  );

  if(!confirmDelete) return;

  try{

    await deleteDoc(
      doc(db,"students",id)
    );

    alert(
      "Student Deleted Successfully"
    );

    loadStudents();

  }

  catch(error){

    console.error(error);

    alert(
      "Error deleting student"
    );

  }

}



window.editStudent =
async function(id){

  const student =
  allStudents.find(
    s => s.id === id
  );

  const newName =
  prompt(
    "Student Name",
    student.name
  );

  if(newName === null) return;

  const newFatherName =
  prompt(
    "Father Name",
    student.fatherName
  );

  if(newFatherName === null) return;

  const newPhone =
  prompt(
    "Phone Number",
    student.phone
  );

  if(newPhone === null) return;

  const newStatus =
  prompt(
    "Status: Paid or Pending",
    student.status || "Pending"
  );

  if(newStatus === null) return;

  try{

    await updateDoc(

      doc(db,"students",id),

      {

        name:newName,

        fatherName:newFatherName,

        phone:newPhone,

        status:newStatus,

        course:student.course,

        batch:student.batch,

        email:student.email,

        address:student.address,

        notes:student.notes

      }

    );

    alert(
      "Student Updated Successfully"
    );

    loadStudents();

  }

  catch(error){

    console.error(error);

    alert(
      "Error Updating Student"
    );

  }

}



document
.getElementById("searchInput")

.addEventListener("input",function(){

  const value =

  this.value.toLowerCase();

  const filtered =

  allStudents.filter((student)=>{

    return (

      (student.name || "")
      .toLowerCase()
      .includes(value)

      ||

      (student.phone || "")
      .toLowerCase()
      .includes(value)

    );

  });

  renderStudents(filtered);

});



document
.getElementById("logoutBtn")

.addEventListener("click",

async ()=>{

  try{

    await signOut(auth);

    alert(
      "Logged Out Successfully"
    );

    window.location.href =
    "login.html";

  }

  catch(error){

    console.error(error);

    alert(
      "Error Logging Out"
    );

  }

});

window.generateReceipt = function(id){

  localStorage.setItem(
    "receiptStudentId",
    id
  );

  window.open(
    "receipt.html",
    "_blank"
  );

}

loadStudents();

</script>

</body>
</html>
