<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Admin Login - TurbanCreations</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:#111;

      display:flex;

      justify-content:center;

      align-items:center;

      min-height:100vh;

    }

    .login-box{

      width:100%;

      max-width:420px;

      background:white;

      padding:40px;

      border-radius:20px;

      box-shadow:0 10px 30px rgba(0,0,0,0.3);

    }

    .login-box h1{

      text-align:center;

      margin-bottom:10px;

      color:#111;

    }

    .login-box p{

      text-align:center;

      color:#666;

      margin-bottom:30px;

      line-height:1.6;

    }

    .input-group{

      margin-bottom:20px;

    }

    .input-group label{

      display:block;

      margin-bottom:8px;

      font-weight:bold;

      color:#222;

    }

    .input-group input{

      width:100%;

      padding:14px;

      border:1px solid #ccc;

      border-radius:10px;

      font-size:15px;

    }

    .login-btn{

      width:100%;

      padding:15px;

      border:none;

      border-radius:10px;

      background:#d4af37;

      color:#111;

      font-size:17px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

    }

    .login-btn:hover{

      background:#111;

      color:white;

    }

  </style>

</head>

<body>

<div class="login-box">

  <h1>Admin Login</h1>

  <p>

    Login to access
    TurbanCreations Admin Panel

  </p>

  <form id="loginForm">

    <div class="input-group">

      <label>Email Address</label>

      <input
      type="email"
      id="email"
      placeholder="Enter Email"
      required>

    </div>


    <div class="input-group">

      <label>Password</label>

      <input
      type="password"
      id="password"
      placeholder="Enter Password"
      required>

    </div>


    <button
    type="submit"
    class="login-btn">

      Login

    </button>

  </form>

</div>


<script type="module"
src="login.js">

</script>

</body>
</html>
